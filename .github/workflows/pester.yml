name: Pester Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'WinGetWrapper/**'
      - 'Tests/**'
      - 'WinGetWrapperSingleScriptFile.ps1'
      - '.github/workflows/pester.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run Pester tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -Filter *.ps1 -File
          $hasErrors = $false
          foreach ($f in $files) {
              $errs = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile($f.FullName, [ref]$null, [ref]([System.Management.Automation.Language.ParseError[]]$errs))
              if ($errs) {
                  $hasErrors = $true
                  Write-Host "::error file=$($f.FullName)::$($errs[0].Message)"
              }
          }
          if ($hasErrors) { exit 1 }

      - name: Run Pester
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force

          $testFiles = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter '*.Tests.ps1' -File
          Write-Host "Working directory: $(Get-Location)"
          Write-Host "Found $($testFiles.Count) test file(s):"
          $testFiles.FullName | ForEach-Object { Write-Host "  $_" }

          if (-not $testFiles) {
              Write-Host "::group::Repository tree"
              Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -File | Select-Object -ExpandProperty FullName | Write-Host
              Write-Host "::endgroup::"
              throw "No *.Tests.ps1 files were found under $env:GITHUB_WORKSPACE"
          }

          $config = New-PesterConfiguration
          $config.Run.Path = $testFiles.FullName
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = Join-Path $env:GITHUB_WORKSPACE 'testResults.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: testResults.xml
